<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video — Super Poo Official Character Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Literata:wght@400;700;900&family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Mulish', sans-serif;
      color: #2d2d2d;
      line-height: 1.6;
      background: #fff;
    }
    img { max-width: 100%; height: auto; display: block; }
    a { text-decoration: none; color: inherit; }

    /* ===== HEADER / NAV ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo img {
      height: 52px;
      width: auto;
    }
    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }
    .nav-links a {
      font-weight: 700;
      font-size: 0.95rem;
      color: #2d2d2d;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #0bbcb7; }

    /* Mobile hamburger */
    .nav-toggle { display: none; background: none; border: none; cursor: pointer; }
    .nav-toggle span {
      display: block;
      width: 26px;
      height: 3px;
      background: #2d2d2d;
      margin: 5px 0;
      border-radius: 2px;
      transition: 0.3s;
    }

    @media (max-width: 700px) {
      .nav-toggle { display: block; }
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #fff;
        padding: 16px 24px;
        box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        gap: 16px;
      }
      .nav-links.open { display: flex; }
    }

    /* ===== HERO SECTION ===== */
    .hero {
      background: linear-gradient(135deg, #e0f7f5 0%, #fef9e7 50%, #fde8ef 100%);
      padding: 60px 24px 70px;
      text-align: center;
      overflow: hidden;
    }
    .hero-inner {
      max-width: 900px;
      margin: 0 auto;
    }
    .hero h1 {
      font-family: 'Literata', serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: #1a1a1a;
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .hero h1 span { color: #0bbcb7; }

    /* ===== SECTION SHARED ===== */
    section { padding: 64px 24px; }
    .section-inner { max-width: 960px; margin: 0 auto; }
    .section-title {
      font-family: 'Literata', serif;
      font-weight: 900;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      text-align: center;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    .section-subtitle {
      text-align: center;
      color: #555;
      font-size: 1.05rem;
      max-width: 640px;
      margin: 0 auto 40px;
    }

    /* ===== VIDEO SECTION ===== */
    .video-content {
      background: #fafafa;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 28px rgba(0,0,0,0.1);
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ===== BOTTOM CTA ===== */
    .bottom-cta {
      background: linear-gradient(135deg, #fde8ef 0%, #e0f7f5 100%);
      text-align: center;
      padding: 60px 24px;
    }
    .bottom-cta h2 {
      font-family: 'Literata', serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      margin-bottom: 10px;
      color: #1a1a1a;
    }
    .bottom-cta p {
      color: #555;
      font-size: 1.05rem;
      margin-bottom: 28px;
    }

    .btn-buy {
      display: inline-block;
      background: #f5a623;
      color: #fff;
      font-family: 'Mulish', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      padding: 16px 48px;
      border-radius: 50px;
      letter-spacing: 1px;
      box-shadow: 0 4px 14px rgba(245,166,35,0.4);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .btn-buy:hover {
      transform: translateY(-2px);
      background: #e6951a;
      box-shadow: 0 6px 20px rgba(245,166,35,0.5);
    }

    /* ===== FOOTER ===== */
    footer {
      background: #1a1a1a;
      color: #ccc;
      text-align: center;
      padding: 32px 24px;
      font-size: 0.9rem;
    }
    footer a { color: #0bbcb7; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="logo.png" alt="Super Poo Books">
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="characters.html">Characters</a></li>
      <li><a href="about.html">Creators</a></li>
      <li><a href="video.html">Video</a></li>
      <li><a href="https://www.amazon.com/dp/1998528111" target="_blank" rel="noopener">Buy Now</a></li>
    </ul>
  </div>
</header>

<!-- ===== HERO SECTION ===== -->
<section class="hero">
  <div class="hero-inner">
    <h1>Super Poo <span>Video</span></h1>
    <p class="hero-subtitle">Watch the adventure unfold!</p>
  </div>
</section>

<!-- ===== VIDEO CONTENT ===== -->
<section class="video-content">
  <div class="section-inner">
    <div class="video-wrapper">
      <iframe 
        src="https://www.youtube.com/embed/2qxSoff1L_g?si=5VITeip_BFpcOz9s"
        title="YouTube video player" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen>
      </iframe>
    </div>
  </div>
</section>

<!-- ===== BOTTOM CTA ===== -->
<section class="bottom-cta">
  <h2>Ready to Explore Dungdale?</h2>
  <p>Grab your copy of the Super Poo Official Character Guide today!</p>
  <a href="https://www.amazon.com/dp/1998528111" target="_blank" rel="noopener" class="btn-buy">BUY NOW ON AMAZON</a>
</section>

<!-- ===== FOOTER ===== -->
<footer>
  <p>&copy; 2026 Super Poo Books. All rights reserved.</p>
  <p style="margin-top:6px;">
    <a href="https://www.amazon.com/dp/1998528111" target="_blank" rel="noopener">Available on Amazon</a>
  </p>
</footer>

</body>
</html>
